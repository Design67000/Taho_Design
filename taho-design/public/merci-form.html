<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Merci - TAHO DESIGN</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f1d4a, #2563eb);
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
      padding: 20px;
    }

    .container {
      background: rgba(255,255,255,0.1);
      padding: 50px 40px;
      border-radius: 20px;
      max-width: 500px;
      backdrop-filter: blur(8px);
      box-shadow: 0 10px 30px rgba(0,0,0,.2);
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 20px;
    }

    p {
      font-size: 1.1rem;
      margin-bottom: 30px;
      line-height: 1.6;
    }

    a {
      display: inline-block;
      padding: 15px 30px;
      background: #2563eb;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      font-weight: bold;
      transition: .3s;
    }

    a:hover {
      background: #1d4ed8;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Merci !</h1>

    <p>
      Votre demande a bien été envoyée.<br>
      Nous reviendrons vers vous dans les meilleurs délais.
    </p>

    <a href="/">Retour au site</a>
  </div>

</body>
</html>
